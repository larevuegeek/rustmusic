<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 48" fill="none">
  <!-- Icône : onde audio stylisée dans un cercle -->
  <g>
    <!-- Cercle fond -->
    <rect x="0" y="4" width="40" height="40" rx="12" fill="url(#iconGrad)" />
    <!-- Barres audio (soundwave) -->
    <rect x="10" y="17" width="3.5" height="14" rx="1.75" fill="white" opacity="0.9"/>
    <rect x="16" y="12" width="3.5" height="24" rx="1.75" fill="white"/>
    <rect x="22" y="15" width="3.5" height="18" rx="1.75" fill="white" opacity="0.9"/>
    <rect x="28" y="10" width="3.5" height="28" rx="1.75" fill="white" opacity="0.7"/>
  </g>

  <!-- Texte "Rust" -->
  <text x="52" y="34" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="28" font-weight="800" letter-spacing="-0.5" fill="currentColor">
    Rust
  </text>

  <!-- Texte "Music" en accent vert -->
  <text x="130" y="34" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="28" font-weight="800" letter-spacing="-0.5" fill="url(#textGrad)">
    Music
  </text>

  <!-- Petit point accent -->
  <circle cx="232" cy="32" r="3.5" fill="#22c55e" />

  <defs>
    <linearGradient id="iconGrad" x1="0" y1="4" x2="40" y2="44" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="130" y1="10" x2="230" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>
</svg>
